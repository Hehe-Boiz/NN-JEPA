# @package _global_

# JEPA-style mixed-servo experiment:
# - horizon/window = 4 frames with frame_stride=2, matching JEPA's lighter AC window.
# - action token includes synthetic domain_id: 0=old/KDS servo, 1=current/TowerPro servo.
# - autoregressive rollout re-LayerNorms predicted latent before feeding it back.

output_dir: checkpoints/rc_jepa_official_lite_base_mix_oldservo_jepa_window_domain_ln

runtime:
  dry_run: false
  require_cuda: true

data:
  features_dir: data/experiments/servo_old_mix_v1/features/vjepa2_1_vitb_384_ema_fp16
  manifest_dir: data/experiments/servo_old_mix_v1/processed/manifests
  state_columns:
    - yaw_rate_t
    - accel_x_t
    - accel_y_t
    - steering_last_t
    - throttle_last_t
  action_columns:
    - steering_cmd_t
    - throttle_cmd_t
    - domain_id
  raw_frames_per_sample: 4
  sequence_stride: 1
  frame_stride: 2
  target_fps: 0.0
  auto_steps: 2
  rollout_state_mode: measured_train
  rollout_feedback_norm: true

model:
  type: official_lite
  size: base
  predictor_dim: null
  predictor_depth: null
  predictor_heads: null
  dropout: 0.0

train:
  epochs: 100
  batch_size: 32
  eval_batch_size: 8
  num_workers: 4
  train_sampler: session
  eval_sampler: session
  lr: 5.0e-5
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_epochs: 5
  warmup_start_factor: 0.1
  min_lr_ratio: 0.1
  early_stopping_patience: 15
  amp_dtype: bf16
  save_every_steps: 0
  save_every_minutes: 20.0
  keep_step_checkpoints: 1
  rollout_eval_state_mode: both
  val_rollout_eval_horizon: 3
  val_rollout_eval_max_batches: 256
  final_eval_horizon: 3
  final_planning_eval_samples: 0
  final_planning_horizon: 0
  final_planning_goal_offset: 0
  final_planning_cem_samples: 32
  final_planning_cem_elites: 8
  final_planning_cem_iters: 3
  final_planning_init_std: 0.5
  final_planning_min_std: 0.05
  final_planning_action_penalty: 0.0
  final_planning_smooth_penalty: 0.0
  resume_from: null
  seed: 42
  device: auto
  no_progress: false
  skip_test: true

wandb:
  disabled: false
  project: nn-jepa-rc
  entity: null
  run_name: rc-jepa-official-lite-base-mix-oldservo-jepa-window-domain-ln
  run_id: null
  continue_run: true
  resume: allow
  mode: online
  tags:
    - official_lite
    - base
    - hydra
    - mixed-servo
    - old-servo
    - jepa-window
    - domain-id
    - rollout-feedback-ln
  log_every: 50
  watch_log: gradients
  watch_freq: 200
  grad_stats_every: 20
  param_stats_every: 200
