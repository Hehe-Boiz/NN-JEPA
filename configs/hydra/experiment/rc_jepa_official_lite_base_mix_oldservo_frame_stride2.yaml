# @package _global_

# Strongest current official-lite predictor for mixed current-servo + old-servo data.
# This keeps the same temporal/data setup as the tiny mixed experiment, but uses
# model.size=base: predictor_dim=512, depth=6, heads=8 (~19.7M trainable params).
# With 8 frames/sample and 576 tokens/frame, this is heavy on 16GB VRAM, so the
# default batch is intentionally conservative.

output_dir: checkpoints/rc_jepa_ac_vitb_features_servo_old_mix_official_lite_base_frame_stride2

runtime:
  dry_run: false
  require_cuda: true

data:
  features_dir: data/experiments/servo_old_mix_v1/features/vjepa2_1_vitb_384_ema_fp16
  manifest_dir: data/experiments/servo_old_mix_v1/processed/manifests
  state_columns:
    - yaw_rate_t
    - accel_x_t
    - accel_y_t
    - steering_last_t
    - throttle_last_t
  action_columns:
    - steering_cmd_t
    - throttle_cmd_t
  raw_frames_per_sample: 8
  sequence_stride: 1
  frame_stride: 2
  target_fps: 0.0
  auto_steps: 2

model:
  type: official_lite
  size: base
  predictor_dim: null
  predictor_depth: null
  predictor_heads: null
  dropout: 0.0

train:
  epochs: 100
  batch_size: 2
  eval_batch_size: 1
  num_workers: 4
  train_sampler: session
  eval_sampler: session
  lr: 5.0e-5
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_epochs: 5
  warmup_start_factor: 0.1
  min_lr_ratio: 0.1
  early_stopping_patience: 15
  amp_dtype: bf16
  val_rollout_eval_horizon: 3
  val_rollout_eval_max_batches: 256
  final_eval_horizon: 3
  final_planning_eval_samples: 16
  final_planning_horizon: 0
  final_planning_goal_offset: 0
  final_planning_cem_samples: 32
  final_planning_cem_elites: 8
  final_planning_cem_iters: 3
  final_planning_init_std: 0.5
  final_planning_min_std: 0.05
  final_planning_action_penalty: 0.0
  final_planning_smooth_penalty: 0.0
  resume_from: null
  seed: 42
  device: auto
  no_progress: false
  skip_test: true

wandb:
  disabled: false
  project: nn-jepa-rc
  entity: null
  run_name: rc-jepa-official-lite-base-mix-oldservo-frame-stride2
  run_id: null
  continue_run: true
  resume: allow
  mode: online
  tags:
    - official_lite
    - base
    - hydra
    - mixed-servo
    - old-servo
    - frame-stride2
    - strongest
  log_every: 20
  watch_log: gradients
  watch_freq: 200
  grad_stats_every: 20
  param_stats_every: 200
